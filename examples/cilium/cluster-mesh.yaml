# Cluster Mesh 配置
# Cluster 1 (EU)
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: cluster-mesh-policy
spec:
  endpointSelector:
    matchLabels:
      app: global-service
  ingress:
  - fromEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: production
        k8s:io.cilium.k8s.policy.cluster: cluster-us
---
# 全局服务
apiVersion: v1
kind: Service
metadata:
  name: backend-global
  namespace: production
  annotations:
    io.cilium/global-service: "true"
    io.cilium/service-affinity: "local"
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8080
---
# Cluster Mesh 配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-mesh-config
data:
  cluster-name: "cluster-eu"
  cluster-id: "1"
---
# Hubble UI 访问
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hubble-ui
  namespace: kube-system
spec:
  rules:
  - host: hubble.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hubble-ui
            port:
              number: 80
