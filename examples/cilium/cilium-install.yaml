# Cilium 安装配置 - Kube-Proxy 替代模式
apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-values
  namespace: kube-system
data:
  values.yaml: |
    # Kube-Proxy 替代
    kubeProxyReplacement: strict
    
    # K8s API Server 配置
    k8sServiceHost: "auto"
    k8sServicePort: "6443"
    
    # 主机服务支持
    hostServices:
      enabled: true
      protocols: tcp,udp
    
    # ExternalIPs 支持
    externalIPs:
      enabled: true
    
    # NodePort 配置
    nodePort:
      enabled: true
      bindProtection: true
      acceleration: native
    
    # BPF 配置
    bpf:
      masquerade: true
      hostRouting: true
      preallocateMaps: true
    
    # 负载均衡
    loadBalancer:
      algorithm: maglev
      mode: dsr  # Direct Server Return
    
    # 带宽管理
    bandwidthManager:
      enabled: true
    
    # Hubble 可观测性
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enabled:
        - dns:query
        - drop
        - tcp
        - flow
        - icmp
        - http
    
    # IPAM
    ipam:
      mode: kubernetes
    
    # 资源
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
---
# CiliumNetworkPolicy 示例
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: production
spec:
  endpointSelector:
    matchLabels:
      app: backend
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: frontend
        namespace: production
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
---
# L7 HTTP 策略
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: api-rate-limit
  namespace: production
spec:
  endpointSelector:
    matchLabels:
      app: api-gateway
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: frontend
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      rules:
        http:
        - method: GET
          path: "/api/v1/users/.*"
        - method: POST
          path: "/api/v1/orders"
---
# DNS 感知策略
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-dns
  namespace: production
spec:
  endpointSelector:
    matchLabels:
      app: microservice
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      rules:
        dns:
        - matchPattern: "*.amazonaws.com"
        - matchName: "api.stripe.com"
  - toFQDNs:
    - matchName: "api.stripe.com"
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
