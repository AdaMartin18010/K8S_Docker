# 工作负载身份注册示例
# 这些命令需要在 SPIRE Server Pod 中执行或使用 spire-server CLI

---
# 使用 Job 自动注册工作负载
apiVersion: batch/v1
kind: Job
metadata:
  name: spire-registration
  namespace: spire
spec:
  template:
    spec:
      serviceAccountName: spire-server
      containers:
      - name: register
        image: ghcr.io/spiffe/spire-server:1.9.0
        command:
        - /bin/sh
        - -c
        - |
          # 等待 Server 就绪
          sleep 10
          
          # 注册 payments namespace 的 backend service
          /opt/spire/bin/spire-server entry create \
            -socketPath /run/spire/sockets/registration.sock \
            -spiffeID spiffe://company.com/ns/payments/sa/backend \
            -parentID spiffe://company.com/spire/agent/k8s_psat/my-cluster \
            -selector k8s:ns:payments \
            -selector k8s:sa:backend \
            -ttl 3600
          
          # 注册 orders namespace 的 api service  
          /opt/spire/bin/spire-server entry create \
            -socketPath /run/spire/sockets/registration.sock \
            -spiffeID spiffe://company.com/ns/orders/sa/api \
            -parentID spiffe://company.com/spire/agent/k8s_psat/my-cluster \
            -selector k8s:ns:orders \
            -selector k8s:sa:api \
            -ttl 3600
          
          # 注册 frontend service
          /opt/spire/bin/spire-server entry create \
            -socketPath /run/spire/sockets/registration.sock \
            -spiffeID spiffe://company.com/ns/web/sa/frontend \
            -parentID spiffe://company.com/spire/agent/k8s_psat/my-cluster \
            -selector k8s:ns:web \
            -selector k8s:sa:frontend \
            -ttl 3600
          
          echo "Registration complete"
        volumeMounts:
        - name: spire-server-socket
          mountPath: /run/spire/sockets
      volumes:
      - name: spire-server-socket
        hostPath:
          path: /run/spire/server-sockets
          type: DirectoryOrCreate
      restartPolicy: OnFailure
---
# 使用自定义资源自动注册 (ClusterSPIFFEID)
# 需要安装 SPIRE Controller Manager
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: backend-identity
spec:
  spiffeIDTemplate: "spiffe://company.com/ns/{{.Pod.Namespace}}/sa/{{.Pod.ServiceAccount}}"
  podSelector:
    matchLabels:
      app: backend
    matchExpressions:
    - key: namespace
      operator: In
      values: ["payments", "billing"]
  workloadSelectorTemplates:
  - "k8s:ns:{{.Pod.Namespace}}"
  - "k8s:sa:{{.Pod.ServiceAccount}}"
---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: api-identity
spec:
  spiffeIDTemplate: "spiffe://company.com/ns/{{.Pod.Namespace}}/sa/{{.Pod.ServiceAccount}}"
  podSelector:
    matchLabels:
      app: api
  namespaceSelector:
    matchLabels:
      spiffe.io/enabled: "true"
  # DNS 名称模板
  dnsNameTemplates:
  - "{{.Pod.Name}}"
  - "{{.Pod.ServiceAccount}}.{{.Pod.Namespace}}.svc"
