# ============================================================================
# ❌ 反例：糟糕的 Pod 配置
# 以下配置包含多个安全和最佳实践违规，请勿在生产中使用
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  # ❌ 错误 1: 没有命名空间（使用 default）
  name: bad-pod
  # ❌ 错误 2: 没有标签或标签不完整
  labels:
    app: bad-app
    # 缺少 version, tier 等重要标签
  # ❌ 错误 3: 没有注解
spec:
  # ❌ 错误 4: 使用默认 Service Account（权限过大）
  # serviceAccountName: default
  # automountServiceAccountToken: true（默认）
  
  # ❌ 错误 5: 没有安全上下文，默认使用 root
  # securityContext: {}
  
  # ❌ 错误 6: 没有节点选择器，可能调度到不合适的节点
  
  containers:
    - name: app
      # ❌ 错误 7: 使用 latest 标签，不可重现
      image: myregistry/app:latest
      # ❌ 错误 8: 镜像拉取策略为 IfNotPresent（可能使用本地旧镜像）
      imagePullPolicy: IfNotPresent
      
      # ❌ 错误 9: 端口没有命名
      ports:
        - containerPort: 8080
      
      # ❌ 错误 10: 硬编码敏感信息
      env:
        - name: DB_PASSWORD
          value: "supersecret123"
        - name: API_KEY
          value: "sk-1234567890abcdef"
      
      # ❌ 错误 11: 没有资源限制
      # resources: {}
      
      # ❌ 错误 12: 没有健康检查
      # livenessProbe: {}
      # readinessProbe: {}
      # startupProbe: {}
      
      # ❌ 错误 13: 容器以 root 运行
      # securityContext: {}
      
      # ❌ 错误 14: 特权容器
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        runAsUser: 0
        capabilities:
          add:
            - NET_ADMIN
            - SYS_ADMIN
            - ALL
      
      # ❌ 错误 15: 挂载主机路径（安全风险）
      volumeMounts:
        - name: host-root
          mountPath: /host
        - name: docker-socket
          mountPath: /var/run/docker.sock
  
  # ❌ 错误 16: 挂载主机路径和敏感文件
  volumes:
    - name: host-root
      hostPath:
        path: /
        type: Directory
    - name: docker-socket
      hostPath:
        path: /var/run/docker.sock
  
  # ❌ 错误 17: 主机网络命名空间（共享网络）
  hostNetwork: true
  
  # ❌ 错误 18: 主机 PID 命名空间（可见主机进程）
  hostPID: true
  
  # ❌ 错误 19: 主机 IPC 命名空间
  hostIPC: true
  
  # ❌ 错误 20: 默认重启策略（没有考虑应用特性）
  # restartPolicy: Always
