# ============================================================================
# Deployment 最佳实践示例
# 演示：滚动更新、HPA、PDB、PodDisruptionBudget
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: production
  labels:
    app: web-app
    version: v1
  annotations:
    # 部署注解
    deployment.kubernetes.io/revision: "1"
    description: "Production web application"
spec:
  # ========== 副本数 ==========
  replicas: 3
  
  # ========== 选择器 ==========
  selector:
    matchLabels:
      app: web-app
  
  # ========== 滚动更新策略 ==========
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # 超出期望副本数的最大数量
      maxSurge: 25%
      # 不可用副本的最大数量
      maxUnavailable: 0
  
  # ========== 进度截止时间 ==========
  progressDeadlineSeconds: 600
  
  # ========== 最小就绪时间 ==========
  minReadySeconds: 30
  
  # ========== 修订历史限制 ==========
  revisionHistoryLimit: 10
  
  template:
    metadata:
      labels:
        app: web-app
        version: v1
      annotations:
        # 每次部署更新注解触发滚动更新
        kubectl.kubernetes.io/restartedAt: "2024-01-01T00:00:00Z"
        # Prometheus 抓取注解
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # ========== 安全上下文 ==========
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # ========== 亲和性 ==========
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - web-app
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - worker
      
      # ========== 拓扑分布约束 ==========
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: web-app
      
      # ========== 初始化容器 ==========
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for database..."
                sleep 2
              done
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
      
      # ========== 主容器 ==========
      containers:
        - name: web-app
          image: myregistry/web-app:v1.0.0
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          env:
            - name: ENV
              value: "production"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          
          # ========== 探针 ==========
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
      
      # ========== 卷 ==========
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: cache
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
      
      # ========== 服务账户 ==========
      serviceAccountName: web-app-sa
      automountServiceAccountToken: false
      
      # ========== 终止优雅期 ==========
      terminationGracePeriodSeconds: 60

---
# ============================================================================
# HorizontalPodAutoscaler (HPA) - 自动扩缩容
# ============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "1000"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
# ============================================================================
# PodDisruptionBudget (PDB) - 保证升级/维护时最小可用副本
# ============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-app-pdb
  namespace: production
spec:
  minAvailable: 2
  # 或者使用 maxUnavailable
  # maxUnavailable: 1
  selector:
    matchLabels:
      app: web-app
