# ============================================================================
# PV 和 PVC 最佳实践
# 存储管理详解
# ============================================================================

---
# StorageClass - 标准存储
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-standard
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete

---
# StorageClass - 高性能 SSD
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: premium-ssd
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-ssd
  replication-type: regional
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Retain
mountOptions:
  - noatime
  - nodiratime

---
# StorageClass - 本地 SSD（高性能、非高可用）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-ssd
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer

---
# PersistentVolume - 静态供应
apiVersion: v1
kind: PersistentVolume
metadata:
  name: manual-pv-001
  labels:
    type: manual
    tier: database
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  local:
    path: /mnt/disks/ssd1
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node-1

---
# PersistentVolumeClaim - 标准应用
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data
  namespace: production
  labels:
    app: myapp
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
# PersistentVolumeClaim - 数据库（高性能）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: database
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: premium-ssd
  resources:
    requests:
      storage: 100Gi
  # 选择器（可选，用于绑定特定 PV）
  selector:
    matchLabels:
      tier: database

---
# PersistentVolumeClaim - 共享存储（ReadWriteMany）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-data
  namespace: production
spec:
  accessModes:
    - ReadWriteMany  # 多个 Pod 同时读写
  storageClassName: nfs-client  # 需要 NFS 或其他支持 RWX 的存储
  resources:
    requests:
      storage: 50Gi

---
# 使用 PVC 的 Pod
apiVersion: v1
kind: Pod
metadata:
  name: data-processor
  namespace: production
spec:
  containers:
    - name: processor
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /data
        - name: shared
          mountPath: /shared
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: app-data
        readOnly: false
    - name: shared
      persistentVolumeClaim:
        claimName: shared-data
        readOnly: false

---
# 数据迁移 Job
apiVersion: batch/v1
kind: Job
metadata:
  name: data-migration
  namespace: production
spec:
  template:
    spec:
      containers:
        - name: migrate
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "Starting data migration..."
              pg_dump -h old-db -U postgres myapp | psql -h new-db -U postgres myapp
              echo "Migration completed"
          volumeMounts:
            - name: data
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 10Gi
      restartPolicy: Never

---
# 存储配额
apiVersion: v1
kind: ResourceQuota
metadata:
  name: storage-quota
  namespace: production
spec:
  hard:
    requests.storage: 500Gi
    persistentvolumeclaims: "10"
    standard.storageclass.storage.k8s.io/requests.storage: 200Gi
    premium-ssd.storageclass.storage.k8s.io/requests.storage: 300Gi

---
# 存储限制 Range
apiVersion: v1
kind: LimitRange
metadata:
  name: storage-limits
  namespace: production
spec:
  limits:
    - type: PersistentVolumeClaim
      max:
        storage: 100Gi
      min:
        storage: 1Gi
      default:
        storage: 10Gi
      defaultRequest:
        storage: 5Gi
