# ============================================================================
# Secret 最佳实践
# 安全存储敏感信息，支持自动更新
# ============================================================================

---
# 通用数据库凭证
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: production
  labels:
    app: web-app
    component: database
type: Opaque
stringData:
  # 使用 stringData 避免手动 base64 编码
  host: "postgres.production.svc.cluster.local"
  port: "5432"
  database: "myapp"
  username: "app_user"
  password: "changeme-strong-password"
  # 连接字符串（方便直接使用）
  dsn: "postgres://app_user:changeme-strong-password@postgres.production.svc.cluster.local:5432/myapp?sslmode=require"

---
# TLS 证书
apiVersion: v1
kind: Secret
metadata:
  name: tls-certificate
  namespace: production
  labels:
    app: web-app
type: kubernetes.io/tls
data:
  # 使用 cert-manager 自动生成时不需要手动设置
  # 这里仅作示例
  tls.crt: |
    LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSU...
  tls.key: |
    LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1JSU...

---
# Docker Registry 凭证
apiVersion: v1
kind: Secret
metadata:
  name: regcred
  namespace: production
  labels:
    app: web-app
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: |
    eyJhdXRocyI6eyJteXJlZ2lzdHJ5LmV4YW1wbGUuY29tIjp7InVzZXJuYW1lIjoi
dXNlciIsInBhc3N3b3JkIjoicGFzcyIsImVtYWlsIjoidXNlckBleGFtcGxlLmNv
bSIsImF1dGgiOiJkWE5sY2pwMWMyVnlPblZ6WlhJNmMyVmpjbVYwTVRJI319fQ==

---
# Service Account Token（使用 TokenRequest API 替代）
apiVersion: v1
kind: Secret
metadata:
  name: web-app-api-token
  namespace: production
  annotations:
    kubernetes.io/service-account.name: web-app-sa
type: kubernetes.io/service-account-token

---
# 使用 External Secrets Operator 从外部密钥管理器同步
# 需要安装 external-secrets 组件
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aws-credentials
  namespace: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: aws-credentials
    creationPolicy: Owner
  data:
    - secretKey: access_key_id
      remoteRef:
        key: production/aws-credentials
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: production/aws-credentials
        property: secret_access_key

---
# Sealed Secret（加密存储在 Git 中）
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-keys
  namespace: production
spec:
  encryptedData:
    stripe_key: AgA...
    sendgrid_key: AgB...
  template:
    metadata:
      labels:
        app: web-app
    type: Opaque
