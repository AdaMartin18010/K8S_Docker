# WebAssembly Application Deployment Manager (WADM) 配置
# 声明式部署 wasmCloud 应用

apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: http-echo-service
  annotations:
    version: v1.0.0
    description: "HTTP Echo Service built with WebAssembly"
spec:
  # 组件列表
  components:
  
  # 1. HTTP 服务组件（WebAssembly 组件）
  - name: http-echo
    type: component
    properties:
      # 组件镜像（OCI 格式）
      image: ghcr.io/wasmcloud/http-echo:0.1.0
      # 组件 ID
      id: http-echo-component
    traits:
    # 扩展器：控制副本数
    - type: spreadscaler
      properties:
        replicas: 3
        spread:
        - name: primary
          requirements:
            region: us-east
          weight: 70
        - name: secondary
          requirements:
            region: us-west
          weight: 30
    
    # 链接：连接到能力提供者
    - type: link
      properties:
        target: httpserver
        namespace: wasi
        package: http
        interfaces: [incoming-handler]
        source_config:
        - name: default-http
          properties:
            address: 0.0.0.0:8080
  
  # 2. HTTP 服务器能力提供者
  - name: httpserver
    type: capability
    properties:
      image: ghcr.io/wasmcloud/http-server:0.26.0
    traits:
    - type: spreadscaler
      properties:
        replicas: 1
  
  # 3. 日志记录能力
  - name: logging
    type: capability
    properties:
      image: ghcr.io/wasmcloud/logging:0.1.0
  
  # 4. 键值存储能力
  - name: keyvalue
    type: capability
    properties:
      image: ghcr.io/wasmcloud/keyvalue-redis:0.27.0
      
    traits:
    - type: link
      properties:
        target: http-echo
        namespace: wasi
        package: keyvalue
        interfaces: [atomics, store]
        target_config:
        - name: redis-config
          properties:
            url: redis://redis:6379

---
# 更复杂的示例：订单处理系统
apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: order-processing
  annotations:
    version: v2.1.0
spec:
  components:
  
  # 订单 API 网关
  - name: order-api
    type: component
    properties:
      image: ghcr.io/example/order-api:2.1.0
    traits:
    - type: spreadscaler
      properties:
        replicas: 2
    - type: link
      properties:
        target: httpserver
        namespace: wasi
        package: http
        interfaces: [incoming-handler]
        source_config:
        - name: api-config
          properties:
            address: 0.0.0.0:8080
    - type: link
      properties:
        target: orders-queue
        namespace: wasmcloud
        package: messaging
        interfaces: [producer]
    - type: link
        target: inventory-db
        namespace: wasi
        package: keyvalue
        interfaces: [store]
  
  # 订单处理器
  - name: order-processor
    type: component
    properties:
      image: ghcr.io/example/order-processor:2.1.0
    traits:
    - type: spreadscaler
      properties:
        replicas: 5
    - type: link
      properties:
        target: orders-queue
        namespace: wasmcloud
        package: messaging
        interfaces: [consumer]
        source_config:
        - name: consumer-config
          properties:
            subscription: orders.new
    - type: link
      properties:
        target: payment-gateway
        namespace: example
        package: payments
        interfaces: [process-payment]
  
  # 能力提供者
  - name: httpserver
    type: capability
    properties:
      image: ghcr.io/wasmcloud/http-server:0.26.0
  
  - name: orders-queue
    type: capability
    properties:
      image: ghcr.io/wasmcloud/messaging-nats:0.23.0
      
  - name: inventory-db
    type: capability
    properties:
      image: ghcr.io/wasmcloud/keyvalue-redis:0.27.0
      
  - name: payment-gateway
    type: capability
    properties:
      image: ghcr.io/example/payment-provider:1.0.0
