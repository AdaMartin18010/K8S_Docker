# WebAssembly RuntimeClass 配置
# 在 Kubernetes 中运行 Wasm 工作负载

apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: wasmtime-spin
handler: spin
scheduling:
  nodeSelector:
    wasm: "true"
---
# Wasm 工作负载 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wasm-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wasm-app
  template:
    metadata:
      labels:
        app: wasm-app
    spec:
      runtimeClassName: wasmtime-spin
      containers:
        - name: app
          image: ghcr.io/myorg/wasm-http-service:latest
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: wasm-service
spec:
  selector:
    app: wasm-app
  ports:
    - port: 80
      targetPort: 8080
