apiVersion: apps/v1
kind: Deployment
metadata:
  name: spin-hello
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spin-hello
  template:
    metadata:
      labels:
        app: spin-hello
    spec:
      runtimeClassName: wasmtime-spin
      nodeSelector:
        wasm-enabled: "true"
      containers:
      - name: spin-app
        image: ghcr.io/fermyon/spin-hello:v1.0
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "8Mi"
            cpu: "10m"
          limits:
            memory: "16Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 1
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: spin-hello
  namespace: default
spec:
  selector:
    app: spin-hello
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spin-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spin-hello
  minReplicas: 3
  maxReplicas: 200
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 10
    scaleDown:
      stabilizationWindowSeconds: 30
