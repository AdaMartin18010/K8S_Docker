# ============================================================================
# GitHub Actions - Kubernetes 部署工作流
# 功能：部署到开发、测试、生产环境
# ============================================================================

name: Kubernetes Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  HELM_VERSION: '3.13.0'
  KUBECTL_VERSION: '1.28.0'

jobs:
  # ==========================================================================
  # 部署到开发环境
  # ==========================================================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'development'
    environment:
      name: development
      url: https://app-dev.example.com
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name dev-cluster --region us-west-2
      
      - name: Deploy with Helm
        run: |
          helm upgrade --install web-app ./helm-charts/web-app \
            --namespace development \
            --create-namespace \
            --values ./helm-charts/web-app/values.yaml \
            --values ./helm-charts/web-app/values-dev.yaml \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m
      
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/web-app -n development --timeout=300s
          kubectl get pods -n development

  # ==========================================================================
  # 部署到测试环境
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://app-staging.example.com
    needs: [deploy-dev]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      
      - name: Deploy with Helm
        run: |
          export KUBECONFIG=kubeconfig
          helm upgrade --install web-app ./helm-charts/web-app \
            --namespace staging \
            --create-namespace \
            --values ./helm-charts/web-app/values.yaml \
            --values ./helm-charts/web-app/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m
      
      - name: Run smoke tests
        run: |
          export KUBECONFIG=kubeconfig
          kubectl port-forward svc/web-app 8080:80 -n staging &
          sleep 5
          curl -f http://localhost:8080/health || exit 1

  # ==========================================================================
  # 部署到生产环境
  # ==========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://app.example.com
    needs: [deploy-staging]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Deploy with Helm
        run: |
          export KUBECONFIG=kubeconfig
          helm upgrade --install web-app ./helm-charts/web-app \
            --namespace production \
            --create-namespace \
            --values ./helm-charts/web-app/values.yaml \
            --values ./helm-charts/web-app/values-prod.yaml \
            --set image.tag=${{ steps.get_version.outputs.VERSION }} \
            --wait \
            --timeout 10m
      
      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/web-app -n production --timeout=600s
      
      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ==========================================================================
  # 金丝雀发布
  # ==========================================================================
  canary-deploy:
    name: Canary Deployment
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'canary'
    environment:
      name: canary
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup tools
        uses: azure/setup-kubectl@v3
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      
      - name: Deploy canary version
        run: |
          export KUBECONFIG=kubeconfig
          
          # 部署金丝雀版本（10% 流量）
          kubectl apply -f k8s/canary-deployment.yaml
          kubectl set image deployment/web-app-canary web-app=ghcr.io/${{ github.repository }}:${{ github.sha }} -n production
          
          # 等待就绪
          kubectl rollout status deployment/web-app-canary -n production --timeout=300s
      
      - name: Monitor canary
        run: |
          echo "Monitoring canary for 10 minutes..."
          sleep 600
          
          # 检查错误率
          ERROR_RATE=$(curl -s "http://prometheus/api/v1/query?query=...")
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "Error rate too high, rolling back..."
            kubectl delete deployment web-app-canary -n production
            exit 1
          fi
      
      - name: Promote to full rollout
        if: success()
        run: |
          export KUBECONFIG=kubeconfig
          kubectl set image deployment/web-app web-app=ghcr.io/${{ github.repository }}:${{ github.sha }} -n production
          kubectl delete deployment web-app-canary -n production
