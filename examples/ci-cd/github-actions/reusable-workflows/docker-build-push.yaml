# 可复用工作流 - Docker 构建与推送 (多架构)
# 使用方法:
#   uses: ./.github/workflows/docker-build-push.yaml
#   with:
#     image-name: myapp
#     platforms: linux/amd64,linux/arm64

name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Image name (without registry)'
        type: string
        required: true
      registry:
        description: 'Container registry'
        type: string
        default: 'ghcr.io'
      platforms:
        description: 'Target platforms'
        type: string
        default: 'linux/amd64'
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        default: './Dockerfile'
      context:
        description: 'Build context'
        type: string
        default: '.'
      push:
        description: 'Push to registry'
        type: boolean
        default: true
      scan:
        description: 'Run vulnerability scan'
        type: boolean
        default: true
      tags:
        description: 'Additional tags (comma-separated)'
        type: string
        default: ''

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=,suffix=,format=short
          ${{ inputs.tags }}
        flavor: |
          latest=auto

    - name: Build and push
      uses: docker/build-push-action@v6
      id: build
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: true
        sbom: true

    - name: Run Trivy vulnerability scanner
      if: inputs.scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      if: inputs.scan && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Generate SBOM
      if: inputs.push
      uses: anchore/sbom-action@v0
      with:
        image: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.sha }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Attest Build Provenance
      if: inputs.push
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
        subject-digest: ${{ steps.build.outputs.digest }}
        push-to-registry: true

    - name: Output image digest
      run: |
        echo "Image: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}"
        echo "Digest: ${{ steps.build.outputs.digest }}"
